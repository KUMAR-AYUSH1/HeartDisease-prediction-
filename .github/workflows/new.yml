name: CI CD pipeline

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install nbmake pytest
                  pip install -r testrequirements.txt

            - name: Test Notebook
              run: |
                  pytest --nbmake test1.ipynb

    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: login to docker hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: build docker image
              run: |
                  docker build -t heartdisease-prediction:latest .
                  docker tag heartdisease-prediction:latest ${{ secrets.DOCKERHUB_USERNAME }}/heartdisease-prediction:latest

            - name: push docker image
              run: |
                  docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/heartdisease-prediction:latest
